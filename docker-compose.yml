services:
  flow2api:
    image: flow2api:local
    build: .
    container_name: flow2api
    ports:
      - "38000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config:/app/config
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
